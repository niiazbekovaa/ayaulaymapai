<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.bg {
    position: fixed;
    width: 100%;
    height: 200%;
    background-image: url("ayaulymapai.jpg");
    background-repeat: repeat;
    background-size: 180px 180px;
    opacity: 0.18;
    animation: moveUpDown 8s ease-in-out infinite alternate;
    z-index: -3;
}

@keyframes moveUpDown {
    0% { transform: translateY(0); }
    100% { transform: translateY(-10%); }
}

/* ✅ СӘЛ ҒАНА ҚАРАНҒЫ ФОН */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: -2;
}

#hearts-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.heart {
    position: absolute;
    color: #ff4fa3;
    opacity: 0.6;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
    10% { opacity: 0.7; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

.scene {
    position: absolute;
    top: 50%;
    left: 50%;
    perspective: 1200px;
    transform: translate(-50%, -50%);
}

.envelope {
    width: 280px;
    height: 170px;
    position: relative;
    cursor: pointer;
}

.base {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ff9a9e, #fad0c4);
    border-radius: 12px;
    z-index: 1;
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ff758c, #ff7eb3);
    clip-path: polygon(0 0, 50% 60%, 100% 0);
    transform-origin: top;
    transition: 0.9s ease;
    z-index: 3;
}

.open .flap {
    transform: rotateX(-180deg);
}

/* 📄 LETTER */
.letter {
    position: absolute;
    width: 260px;
    height: 170px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.98);
    border-radius: 12px;
    padding: 10px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    opacity: 0;
    transition: 0.9s ease;
    z-index: 5;
}

.open .letter {
    transform: translate(-50%, -210px) scale(1);
    opacity: 1;
}

.content {
    width: 100%;
}

.content h2 {
    font-size: 15px;
    margin: 0 0 8px 0;
    font-weight: 600;
    color: #222;
}

.content p {
    margin: 6px 0;
    font-size: 12px;
    line-height: 1.4;
}

.info {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.9;
}

/* 🎉 CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 12px;
    top: -10px;
    z-index: 999;
    opacity: 0.9;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(720deg);
    }
}

audio {
    display: none;
}

.hint {
    position: absolute;
    top: 70%;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="hearts-bg"></div>

<audio id="music" src="Seniizdeim.mp3"></audio>

<div class="scene">
    <div class="envelope" id="env">
        <div class="base"></div>
        <div class="flap"></div>

        <div class="letter">
            <div class="content">
                <h2>Dear, Daryn agay</h2>

                <p>
                    Сіздерді Отан қорғаушылар күніне<br>
                    арналған мерекелік күнге шақырамын!
                </p>

                <p class="info">
                    📅 May 9<br>
                    ⏰ 15:00<br>
                    🏫 Mart (осы жерге уақытында келсеніз ар жағы құпия)
	   Dress-code: Жеңіл, ыңғайлы киім (+қасына ауыстыратын киім алу керек)
                </p>
            </div>
        </div>
    </div>
</div>

<div class="hint">Click envelope 💌</div>

<script>
let opened = false;

const env = document.getElementById("env");
const music = document.getElementById("music");

/* 💖 HEARTS */
function createHearts() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤";

    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random() * 16 + 10) + "px";
    h.style.animationDuration = (Math.random() * 6 + 4) + "s";

    document.getElementById("hearts-bg").appendChild(h);

    setTimeout(() => h.remove(), 10000);
}
setInterval(createHearts, 220);

/* 🎉 CONFETTI FUNCTION */
function createConfetti() {
    for (let i = 0; i < 120; i++) {
        const c = document.createElement("div");
        c.className = "confetti";

        c.style.left = Math.random() * 100 + "vw";
        c.style.background = `hsl(${Math.random()*360}, 100%, 60%)`;
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 5000);
    }
}

/* 💌 OPEN */
env.addEventListener("click", () => {
    if (opened) return;
    opened = true;

    env.classList.add("open");

    createConfetti(); // 🎉 қосылды

    music.volume = 0;
    music.loop = true;
    music.play();

    let v = 0;
    let fade = setInterval(() => {
        if (v < 1) {
            v += 0.05;
            music.volume = v;
        } else {
            clearInterval(fade);
        }
    }, 120);
});
</script>

</body>
</html>
